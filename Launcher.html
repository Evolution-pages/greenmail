<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Launching...</title>
  <script>
    window.addEventListener("load", () => {
      fetch("proxy.php?file=content.html") // Fetch via proxy
        .then(res => res.text())
        .then(html => {
          // Create a blob from the HTML content
          const blob = new Blob([html], { type: "text/html" });
          const blobUrl = URL.createObjectURL(blob);

          // Redirect browser to the blob URL
          location.href = blobUrl;
        })
        .catch(err => {
          document.body.innerHTML = `<p style="color:red;">Error loading content: ${err}</p>`;
        });
    });
  </script>
</head>
<body>
  <p>Launching secure blob...</p>
</body>
</html>
